name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    name: Quality (Lint + Compile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Ktlint Check
        run: ./gradlew ktlintCheck --stacktrace

      - name: Compile
        run: ./gradlew clean classes testClasses --stacktrace

  tests:
    name: Functional Tests (Java ${{ matrix.java-version }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ["21", "25"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: gradle

      - name: Run Tests
        run: ./gradlew test --stacktrace

  smoke:
    name: Smoke Consumer (Composite Build)
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Smoke Consumer Verification
        run: |
          cd src/test/resources/smoke-consumer
          cat <<'EOF' > settings.gradle.kts
          pluginManagement {
              includeBuild("../../../..")
          }

          rootProject.name = "smoke-consumer"
          EOF
          ../../../../gradlew help --stacktrace
