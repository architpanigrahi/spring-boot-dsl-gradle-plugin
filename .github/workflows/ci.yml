name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ["21", "25"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: gradle

      - name: Gradle Build
        run: ./gradlew clean build --stacktrace

      - name: Smoke Consumer (Composite Build)
        run: |
          cd src/test/resources/smoke-consumer
          cat <<'EOF' > settings.gradle.kts
          pluginManagement {
              includeBuild("../../../..")
          }

          rootProject.name = "smoke-consumer"
          EOF
          ../../../../gradlew help --stacktrace
